<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nations Football Association</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(120deg,#000,#111,#000);
color:white;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:black;
border-bottom:1px solid #222;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:600;
transition:.3s;
}

nav a:hover{
color:#ccc;
}

.logo img{
height:50px;
}

.hero{
height:400px;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:800;
background:linear-gradient(90deg,#fff,#888);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:60px;
}

.card{
background:#111;
padding:30px;
border-radius:15px;
text-align:center;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px);
background:#151515;
}

footer{
text-align:center;
padding:20px;
border-top:1px solid #222;
}

</style>

</head>

<body>

<nav>

<div class="logo">
<img src="logo.png">
</div>

<div>
<a href="index.html">Home</a>
<a href="articles.html">Articles</a>
<a href="gfx.html">GFX</a>
<a href="scoreboards.html">Scoreboards</a>
<a href="live.html">Live</a>
</div>

</nav>

<div class="hero">
Nations Football Association
</div>

<div class="cards">

<div class="card" onclick="location.href='articles.html'">
<h2>Articles</h2>
<p>Check latest league news</p>
</div>

<div class="card" onclick="location.href='gfx.html'">
<h2>League GFX</h2>
<p>View all graphics</p>
</div>

<div class="card" onclick="location.href='scoreboards.html'">
<h2>Scoreboards</h2>
<p>Match results</p>
</div>

<div class="card" onclick="location.href='live.html'">
<h2>Live Time</h2>
<p>Live updates</p>
</div>

</div>

<footer>
Nations Football Association © 2026
</footer>

</body>
</html>
